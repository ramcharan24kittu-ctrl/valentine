<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Varsha ❤️</title>

<style>
  body {
    margin:0;
    font-family: "Poppins", sans-serif;
    text-align:center;
    background: linear-gradient(to bottom, #ff9bb3, #ffd6e0);
    color:white;
    overflow:hidden;
  }

  h1 {
    margin-top:80px;
    font-size:24px;
  }

  button {
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:50px;
    margin:10px;
    color:white;
  }

  #yes { background:#ff4d6d; }
  #no { background:#ff85a2; }

  /* Floating hearts */
  .heart {
    position:absolute;
    color:#ff4d6d;
    animation: floatUp 6s linear infinite;
  }

  @keyframes floatUp {
    from {
      transform: translateY(100vh) scale(0.5);
      opacity:1;
    }
    to {
      transform: translateY(-10vh) scale(1.2);
      opacity:0;
    }
  }

  /* Rocket */
  .rocket {
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
  }

  .launch {
    animation: fly 2s forwards;
  }

  @keyframes fly {
    to {
      bottom:100%;
      opacity:0;
    }
  }

  /* Explosion */
  .blast {
    position:absolute;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:30px;
    opacity:0;
    animation: explode 1s forwards;
    animation-delay:2s;
  }

  @keyframes explode {
    0% { opacity:1; transform:translate(-50%, -50%) scale(0.5); }
    100% { opacity:0; transform:translate(-50%, -50%) scale(3); }
  }

  .finalText {
    position:absolute;
    top:45%;
    width:100%;
    font-size:28px;
    opacity:0;
    animation: showText 1s forwards;
    animation-delay:3s;
  }

  @keyframes showText {
    to { opacity:1; }
  }
</style>
</head>

<body>

<div id="main">
  <h1 id="text">Varsha, will you be my Valentine? 💖</h1>
  <button id="yes">Yes ❤️</button>
  <button id="no">No 💔</button>
</div>

<script>
let noCount = 0;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const text = document.getElementById("text");

// Floating hearts generator
function createHearts() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHearts, 500);

// NO logic
noBtn.onclick = () => {
  noCount++;

  if(noCount === 1){
    text.innerHTML = "😢 don't say no...";
  }
  else if(noCount === 2){
    text.innerHTML = "Think again 😭";
  }
  else if(noCount === 3){
    noBtn.style.display = "none";
    text.innerHTML = "Don't search for No 😏 press Yes or I will send tubelight 😂";
  }
};

// YES → Rocket screen
yesBtn.onclick = () => {
  document.body.innerHTML = `
    <h1>Tap to launch the rocket 🚀</h1>
    <div class="rocket" id="rocket">🚀</div>
  `;

  const rocket = document.getElementById("rocket");

  document.body.onclick = () => {
    rocket.classList.add("launch");

    setTimeout(() => {
      document.body.innerHTML += `
        <div class="blast">💖✨💥</div>
        <div class="finalText">Love you 💞</div>
      `;
    }, 2000);
  };
};
</script>

</body>
</html>
